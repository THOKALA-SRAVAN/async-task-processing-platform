<svg width="900" height="490" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-back" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="900" height="490" fill="#ffffff"/>
  <rect width="900" height="490" fill="url(#bg)" rx="0"/>

  <!-- ── Title ─────────────────────────────────────────────────────── -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">
    Async Task Processing Platform
  </text>
  <text x="450" y="57" text-anchor="middle" font-size="11" fill="#94a3b8">
    Architecture Overview
  </text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ── Client ──────────────────────────────────────────────────── -->
  <rect x="40" y="100" width="130" height="65" rx="10" fill="#6366f1"/>
  <text x="105" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Client</text>
  <line x1="60" y1="134" x2="150" y2="134" stroke="#a5b4fc" stroke-width="0.8"/>
  <text x="105" y="150" text-anchor="middle" font-size="10" fill="#c7d2fe">HTTP / REST</text>

  <!-- ── API Server ───────────────────────────────────────────────── -->
  <rect x="260" y="78" width="210" height="108" rx="10" fill="#1e3a8a"/>
  <text x="365" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">API Server</text>
  <line x1="280" y1="112" x2="450" y2="112" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="365" y="127" text-anchor="middle" font-size="10" fill="#93c5fd">Express · Rate Limiter</text>
  <text x="365" y="142" text-anchor="middle" font-size="10" fill="#93c5fd">Idempotency · Validation</text>
  <text x="365" y="157" text-anchor="middle" font-size="10" fill="#60a5fa">responds in &lt;5ms always</text>
  <text x="365" y="172" text-anchor="middle" font-size="10" fill="#60a5fa">correlationId on every req</text>

  <!-- ── PostgreSQL ───────────────────────────────────────────────── -->
  <rect x="210" y="300" width="190" height="78" rx="10" fill="#1e40af"/>
  <text x="305" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">PostgreSQL</text>
  <line x1="230" y1="334" x2="380" y2="334" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="305" y="349" text-anchor="middle" font-size="10" fill="#93c5fd">tasks · task_runs</text>
  <text x="305" y="364" text-anchor="middle" font-size="10" fill="#60a5fa">source of truth · run history</text>

  <!-- ── Redis / BullMQ ───────────────────────────────────────────── -->
  <rect x="560" y="78" width="200" height="108" rx="10" fill="#991b1b"/>
  <text x="660" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Redis / BullMQ</text>
  <line x1="580" y1="112" x2="740" y2="112" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="660" y="127" text-anchor="middle" font-size="10" fill="#fca5a5">persistent job queue</text>
  <text x="660" y="142" text-anchor="middle" font-size="10" fill="#fca5a5">retry scheduler</text>
  <text x="660" y="157" text-anchor="middle" font-size="10" fill="#fca5a5">exponential backoff</text>
  <text x="660" y="172" text-anchor="middle" font-size="10" fill="#fca5a5">job deduplication</text>

  <!-- ── Worker Process ───────────────────────────────────────────── -->
  <rect x="560" y="300" width="200" height="78" rx="10" fill="#166534"/>
  <text x="660" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Worker Process</text>
  <line x1="580" y1="334" x2="740" y2="334" stroke="#86efac" stroke-width="0.8"/>
  <text x="660" y="349" text-anchor="middle" font-size="10" fill="#86efac">handler registry</text>
  <text x="660" y="364" text-anchor="middle" font-size="10" fill="#86efac">executes job · writes run log</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ── Arrow 1: Client → API ───────────────────────────────────── -->
  <line x1="171" y1="133" x2="258" y2="126" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="172" y="108" width="84" height="17" rx="3" fill="#f1f5f9"/>
  <text x="214" y="120" text-anchor="middle" font-size="9.5" fill="#334155">POST /api/tasks</text>

  <!-- ── Arrow 2: API → PostgreSQL ────────────────────────────────── -->
  <line x1="335" y1="186" x2="305" y2="298" stroke="#64748b" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="222" y="234" width="82" height="28" rx="3" fill="#f1f5f9"/>
  <text x="263" y="246" text-anchor="middle" font-size="9" fill="#334155">① write task</text>
  <text x="263" y="258" text-anchor="middle" font-size="9" fill="#334155">PENDING</text>

  <!-- ── Arrow 3: API → Redis ─────────────────────────────────────── -->
  <line x1="471" y1="128" x2="558" y2="128" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="479" y="112" width="78" height="17" rx="3" fill="#f1f5f9"/>
  <text x="518" y="124" text-anchor="middle" font-size="9.5" fill="#334155">② enqueue job</text>

  <!-- ── Arrow 4: Redis → Worker ──────────────────────────────────── -->
  <line x1="660" y1="186" x2="660" y2="298" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="670" y="234" width="68" height="17" rx="3" fill="#f1f5f9"/>
  <text x="704" y="246" text-anchor="middle" font-size="9.5" fill="#334155">③ pull job</text>

  <!-- ── Arrow 5: Worker → PostgreSQL ────────────────────────────── -->
  <line x1="558" y1="339" x2="402" y2="339" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="444" y="322" width="100" height="28" rx="3" fill="#f1f5f9"/>
  <text x="494" y="334" text-anchor="middle" font-size="9" fill="#334155">④ update status</text>
  <text x="494" y="346" text-anchor="middle" font-size="9" fill="#334155">+ write run log</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ── Lifecycle Strip ─────────────────────────────────────────── -->
  <line x1="40" y1="410" x2="860" y2="410" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="428" text-anchor="middle" font-size="10.5" font-weight="600" fill="#94a3b8" letter-spacing="1">TASK LIFECYCLE</text>

  <!-- PENDING -->
  <rect x="55"  y="440" width="110" height="30" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="460" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400e">PENDING</text>

  <line x1="165" y1="455" x2="183" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- QUEUED -->
  <rect x="183" y="440" width="110" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="238" y="460" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1e40af">QUEUED</text>

  <line x1="293" y1="455" x2="311" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PROCESSING -->
  <rect x="311" y="440" width="128" height="30" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="375" y="460" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6b21a8">PROCESSING</text>

  <!-- fork arrow to COMPLETED -->
  <line x1="439" y1="448" x2="458" y2="440" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- fork arrow to FAILED -->
  <line x1="439" y1="462" x2="458" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- COMPLETED -->
  <rect x="457" y="428" width="130" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="522" y="448" text-anchor="middle" font-size="10.5" font-weight="700" fill="#15803d">COMPLETED</text>

  <!-- FAILED -->
  <rect x="457" y="460" width="130" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="522" y="480" text-anchor="middle" font-size="10.5" font-weight="700" fill="#991b1b">FAILED</text>

  <text x="600" y="447" text-anchor="start" font-size="9" fill="#94a3b8">success</text>
  <text x="600" y="479" text-anchor="start" font-size="9" fill="#94a3b8">retries exhausted</text>

</svg>
