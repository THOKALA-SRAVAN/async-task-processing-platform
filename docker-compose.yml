version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: async_tasks_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: async_tasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: async_tasks_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: async_tasks_api
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/async_tasks
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: tasks
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
      JOB_ATTEMPTS: 3
      JOB_BACKOFF: 2000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    container_name: async_tasks_worker
    command: npm run start:worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/async_tasks
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: tasks
      WORKER_CONCURRENCY: 5
      JOB_ATTEMPTS: 3
      JOB_BACKOFF: 2000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
